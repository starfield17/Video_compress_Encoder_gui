name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  QT_QPA_PLATFORM: offscreen
  PYTHONUTF8: "1"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - windows-2022
          - macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Linux Qt runtime dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0

      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall -q main.py cli core gui scripts test

      - name: Check CLI help
        run: python main.py --cli --help

      - name: Run unit tests
        run: python -m unittest discover -s test -p "test_*.py" -v

  packaging-smoke:
    name: Nuitka packaging smoke (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            target: windows-x86_64
            architecture: x64
            package_kind: standalone
            windows_compiler: mingw64

          - os: windows-11-arm
            target: windows-arm64
            architecture: arm64
            package_kind: standalone
            windows_compiler: clang

          - os: ubuntu-22.04
            target: linux-x86_64
            architecture: x64
            package_kind: standalone

          - os: ubuntu-24.04-arm
            target: linux-arm64
            architecture: arm64
            package_kind: standalone

          - os: macos-15-intel
            target: macos-x86_64
            architecture: x64
            target_arch: x86_64
            package_kind: macos-app

          - os: macos-15
            target: macos-arm64
            architecture: arm64
            target_arch: arm64
            package_kind: macos-app
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: ${{ matrix.architecture }}
          cache: pip
          cache-dependency-path: requirements-build.txt

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            patchelf \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Diagnose packaging interpreter
        run: python -c "import platform, PySide6; print(platform.platform()); print(platform.machine()); print(PySide6.__version__)"

      - name: Build Windows standalone package
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python .\scripts\build_nuitka.py `
            --clean `
            --version 0.0.0 `
            --windows-compiler "${{ matrix.windows_compiler }}"

      - name: Build Linux standalone package
        if: runner.os == 'Linux'
        shell: bash
        run: |
          python scripts/build_nuitka.py \
            --clean \
            --version 0.0.0

      - name: Build macOS app bundle
        if: runner.os == 'macOS' && matrix.package_kind == 'macos-app'
        shell: bash
        run: |
          python scripts/build_nuitka.py \
            --clean \
            --version 0.0.0 \
            --macos-app-bundle \
            --target-arch "${{ matrix.target_arch }}"

      - name: Verify packaged executable on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $executable = ".\dist\video-compressor\video-compressor.exe"

          if (-not (Test-Path $executable)) {
              throw "Packaged executable not found: $executable"
          }

          & $executable --cli --help

          if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
          }

      - name: Verify packaged executable on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          test -f dist/video-compressor/video-compressor
          chmod +x dist/video-compressor/video-compressor
          ./dist/video-compressor/video-compressor --cli --help

      - name: Verify macOS app bundle and DMG
        if: runner.os == 'macOS' && matrix.package_kind == 'macos-app'
        shell: bash
        env:
          TARGET_ARCH: ${{ matrix.target_arch }}
        run: |
          app="dist/Video Compressor.app"
          executable="$app/Contents/MacOS/video-compressor"
          dmg="dist/video-compressor.dmg"

          test -d "$app"
          test -f "$app/Contents/Info.plist"
          test -x "$executable"
          "$executable" --cli --help
          codesign --verify --deep --strict "$app"
          file "$executable"

          archs="$(lipo -archs "$executable")"
          if [[ "$archs" != "$TARGET_ARCH" ]]; then
              printf 'Expected native %s executable, found %s\n' "$TARGET_ARCH" "$archs" >&2
              exit 1
          fi

          test -f "$dmg"
          hdiutil verify "$dmg"

      - name: Upload Nuitka compilation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nuitka-report-${{ matrix.target }}
          path: build/reports/**
          include-hidden-files: true
          if-no-files-found: warn
