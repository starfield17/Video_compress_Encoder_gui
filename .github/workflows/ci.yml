name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  QT_QPA_PLATFORM: offscreen
  PYTHONUTF8: "1"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - windows-2022
          - macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Linux Qt runtime dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0

      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall -q main.py cli core gui scripts test

      - name: Check CLI help
        run: python main.py --cli --help

      - name: Run unit tests
        run: python -m unittest discover -s test -p "test_*.py" -v

  packaging-smoke:
    name: Nuitka packaging smoke
    needs: test
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-build.txt

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            patchelf \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Build standalone package
        run: python scripts/build_nuitka.py --clean --version 0.0.0

      - name: Verify packaged executable
        run: |
          test -f dist/video-compressor/video-compressor
          chmod +x dist/video-compressor/video-compressor
          ./dist/video-compressor/video-compressor --cli --help

      - name: Upload Nuitka compilation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nuitka-ci-report
          path: build/reports/**
          include-hidden-files: true
          if-no-files-found: warn
